<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potwierdź swoje konto</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f4f4f6;
            color: #111116;
            font-size: 15px;
            line-height: 1.5;
            padding: 40px 16px;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e4e4e9;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            background-color: #f97316;
            border-radius: 8px;
            display: inline-block;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: #111116;
        }
        .divider {
            border: none;
            border-top: 1px solid #e4e4e9;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #111116;
            margin-bottom: 12px;
        }
        p {
            color: #6b6b7b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 12px 28px;
            background-color: #f97316;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #ea6a0a;
        }
        .link-fallback {
            margin-top: 24px;
            padding: 14px 16px;
            background-color: #f9f9fb;
            border: 1px solid #e4e4e9;
            border-radius: 8px;
            font-size: 13px;
            color: #6b6b7b;
        }
        .link-fallback a {
            color: #f97316;
            word-break: break-all;
        }
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e4e4e9;
            font-size: 13px;
            color: #b0b0be;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <span class="brand-icon"></span>
        <span class="brand-name">Subscription</span>
    </div>
    <hr class="divider">

    <h1>Potwierdź swoje konto</h1>
    <p>Dziękujemy za rejestrację. Kliknij poniższy przycisk, aby aktywować swoje konto.</p>

    <a th:href="${URL}" class="btn" target="_blank">Potwierdź konto</a>

    <div class="link-fallback">
        <p style="margin-bottom: 6px; font-size: 13px; color: #6b6b7b;">Jeśli przycisk nie działa, skopiuj i wklej ten link w przeglądarce:</p>
        <a th:href="${URL}" th:text="${URL}" target="_blank"></a>
    </div>

    <div class="footer">
        <p>Jeśli nie zakładałeś konta, możesz zignorować tę wiadomość.</p>
    </div>
</div>
</body>
</html>
